# =============================================================================
# DaBaShou Docker Compose - Development Mode
# Usage: docker-compose up -d --build
# Access: http://localhost:5173 (frontend), http://localhost:9090 (backend API)
# =============================================================================

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dabashou-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dabashou123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dabashou}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-dabashou123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dabashou-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dabashou-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabashou-net

  # Backend API (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: dabashou-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dabashou}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dabashou123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-here-change-in-production}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/doc.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dabashou-net

  # Frontend (Vite Dev Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    container_name: dabashou-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
      VITE_WS_URL: ws://localhost:9090/ws
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    networks:
      - dabashou-net

networks:
  dabashou-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
