spring:
  datasource:
    url: jdbc:h2:mem:dabashou_test;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER,ORDER,TYPE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration-h2
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.dabashou: warn
    org.springframework: warn

dabashou:
  jwt:
    secret: test-256-bit-secret-key-for-dabashou-integration-tests
    expiration: 86400000
    refresh-expiration: 604800000
    header: Authorization
    prefix: "Bearer "
